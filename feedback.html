  <style>
    body {
      background: #FFFFFF;
      background-image: radial-gradient(circle at 1px 1px, rgb(158 158 158 / 24%) 1px, transparent 0);
      background-size: 20px 20px;
      color: #000000;
      font-family: 'PT Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    .header {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.2);
      z-index: 1030;
      height: 56px;
    }

    .hero-section {
      height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem;
      box-sizing: border-box;
    }

    .feedback-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 2rem 2.5rem;
      max-width: 380px;
      text-align: center;
    }

    .feedback-card h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #000;
    }

    .feedback-card p {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.4;
      margin: 0;
    }

<body>
  <header class="header fixed-top">
    <div class="container d-flex flex-wrap justify-content-between align-items-center py-2" style="height: 56px;">
      <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
        <img src="favicon.png" alt="Dwellable" style="width: 24px; height: 24px; margin-right: 8px;">
        <span class="fw-bold fs-4">Dwellable</span>
      </a>
    </div>
  </header>

  <div class="hero-section">
    <div class="feedback-card">
      <h1>Thank you for your feedback</h1>
      <p>We appreciate you taking the time to let us know.</p>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var helpful = params.get('helpful');
      if (helpful === 'yes' || helpful === 'no') {
        amplitude.track('Engagement Email Feedback', {
          helpful: helpful === 'yes',
          source: 'engagement_email'
        });
      }
    })();
  </script>
</body>
</html>
