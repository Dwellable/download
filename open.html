<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-itunes-app" content="app-id=6444394386, app-argument=https://dwellable.app/open?path=reminders/setup">
  <title>Open Dwellable</title>
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&family=PT+Sans:wght@700&family=PT+Sans&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    body {
      background: #FFFFFF;
      background-image: radial-gradient(circle at 1px 1px, rgb(158 158 158 / 24%) 1px, transparent 0);
      background-size: 20px 20px;
      color: #000000;
      font-family: 'PT Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    .header {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.2);
      z-index: 1030;
      height: 56px;
    }

    .hero-section {
      height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem;
      box-sizing: border-box;
    }

    .open-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 1.5rem 2rem;
      max-width: 380px;
      text-align: center;
    }

    .open-card h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #000;
    }

    .open-card p {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.4;
      margin: 0 0 0.75rem 0;
    }

    .qr-wrapper {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
      display: inline-block;
    }

    .qr-wrapper img {
      display: block;
      border-radius: 8px;
      width: 140px;
      height: 140px;
    }

    .store-badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      margin-top: 1rem;
    }

    .store-badges a {
      display: inline-block;
      flex-shrink: 0;
    }

    .store-badges .app-store img {
      height: 40px;
      width: auto;
    }

    .store-badges .play-store img {
      height: 58px;
      width: auto;
    }

    #loading {
      height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .loading-content {
      text-align: center;
    }

    .loading-content h2 {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1.5rem;
      color: #000;
      margin-bottom: 0.5rem;
    }

    .loading-content p {
      color: #666;
      font-size: 0.95rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #0d8c68;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #fallback { display: none; }
  </style>
</head>
<body>
  <header class="header fixed-top">
    <div class="container d-flex flex-wrap justify-content-between align-items-center py-2" style="height: 56px;">
      <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
        <img src="favicon.png" alt="Dwellable" style="width: 24px; height: 24px; margin-right: 8px;">
        <span class="fw-bold fs-4">Dwellable</span>
      </a>
    </div>
  </header>

  <div id="fallback">
    <div class="hero-section">
      <div class="open-card">
        <h1>Get the Dwellable app</h1>
        <p>Scan the QR code with your phone to open Dwellable</p>
        <div class="qr-wrapper">
          <img id="qr" src="" alt="QR Code" width="140" height="140">
        </div>
        <p style="font-size: 0.9rem; margin-bottom: 0;">Or download the app below</p>
        <div class="store-badges">
          <a class="app-store" href="https://apps.apple.com/us/app/dwellable-home-inspector/id6444394386" target="_blank">
            <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
          </a>
          <a class="play-store" href="https://play.google.com/store/apps/details?id=com.dwellable" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="loading">
    <div class="loading-content">
      <div class="spinner"></div>
      <h2>Opening Dwellable...</h2>
      <p>If the app doesn't open, you'll see a QR code in a moment</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const path = params.get('path') || 'reminders/setup';
    const deepLink = `dwellable://${path}`;
    // Use https URL in QR so phone cameras recognize it; when opened on phone, page tries deep link then shows fallback
    // Point to interstitial page - tries deep link, then shows QR + store badges
    const baseUrl = location.protocol === 'file:' ? 'https://dwellable.app' : location.origin;
    const qrUrl = baseUrl + '/open.html?path=' + encodeURIComponent(path);

    document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(qrUrl)}`;

    let appOpened = false;
    document.addEventListener('visibilitychange', () => { if (document.hidden) appOpened = true; });
    window.addEventListener('pagehide', () => { appOpened = true; });

    window.location.href = deepLink;

    setTimeout(() => {
      if (!appOpened && !document.hidden) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('fallback').style.display = 'block';
      }
    }, 1500);
  </script>
</body>
</html>
